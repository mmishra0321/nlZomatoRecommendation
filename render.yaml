# Render Blueprint: FastAPI backend (repo root = service root).
# Import in Render dashboard: New → Blueprint → connect this repo.
# Set secret env vars (GROQ_API_KEY, CORS_ORIGINS) in the dashboard if not using sync: false placeholders.

services:
  - type: web
    name: nlzomato-recommendations-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install --upgrade pip && pip install -r backend/requirements.txt
    startCommand: PYTHONPATH=. uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='*'
    healthCheckPath: /health
    envVars:
      - key: DATASET_ID
        value: ManikaSaini/zomato-restaurant-recommendation
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: PIPELINE_TIMEOUT_SECONDS
        value: "90"
      # Comma-separated browser origins allowed to call this API directly (e.g. https://your-app.vercel.app).
      # Required for browser → Render; Next.js server-side proxy may still call the API without CORS from the same origin.
      - key: CORS_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
